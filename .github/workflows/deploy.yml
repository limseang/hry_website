name: Deploy HRY Website

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hry-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /var/www/hry_web
      NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE || 'http://157.10.73.67:8082/api/v1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Deploy to ${{ env.DEPLOY_DIR }}
        run: |
          sudo mkdir -p "$DEPLOY_DIR"
          sudo rsync -a --delete .output/public/ "$DEPLOY_DIR"/
          sudo chown -R www-data:www-data "$DEPLOY_DIR"
